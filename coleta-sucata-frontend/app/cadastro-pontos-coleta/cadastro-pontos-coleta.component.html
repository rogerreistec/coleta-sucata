<div class="ponto-coleta-form">
  <h2>Cadastro de Pontos de Coleta</h2>
  <form [formGroup]="pontoColetaForm" (ngSubmit)="onSubmit()">
    
    <label for="nomeEmpresa">Nome do comércio ou empresa</label>
    <input id="nomeEmpresa" type="text" formControlName="nomeEmpresa">
    <div *ngIf="pontoColetaForm.controls['nomeEmpresa'].invalid && pontoColetaForm.controls['nomeEmpresa'].touched">
      Nome é obrigatório.
    </div>
    
    <label for="endereco">Endereço do local</label>
    <input id="endereco" type="text" formControlName="endereco">
    <div *ngIf="pontoColetaForm.controls['endereco'].invalid && pontoColetaForm.controls['endereco'].touched">
      Endereço é obrigatório.
    </div>
    
    <label for="telefone">Telefone para contato</label>
    <input id="telefone" type="text" formControlName="telefone">
    <div *ngIf="pontoColetaForm.controls['telefone'].invalid && pontoColetaForm.controls['telefone'].touched">
      Telefone é obrigatório.
    </div>
    
    <label for="email">Email para contato</label>
    <input id="email" type="email" formControlName="email">
    <div *ngIf="pontoColetaForm.controls['email'].invalid && pontoColetaForm.controls['email'].touched">
      Insira um email válido.
    </div>
    
    <button type="submit" [disabled]="pontoColetaForm.invalid">Cadastrar</button>
  </form>
</div>
